<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💞 TEMPLE_MD BOT Pairing 💞</title>
<style>
    body { font-family: Arial, sans-serif; background: #1e1e2f; color: #fff; text-align: center; padding: 50px; }
    h1 { color: #ff6b81; }
    img { margin: 20px 0; border: 5px solid #ff6b81; border-radius: 10px; }
    p { font-size: 18px; }
</style>
</head>
<body>

<h1>💞 TEMPLE_MD BOT Pairing 💞</h1>
<p>Scan this QR with your WhatsApp to pair your bot:</p>
<img id="qr" src="" alt="QR Code" width="300" height="300">
<p>Once paired, your bot will be online and you can use commands on WhatsApp.</p>

<script>
async function fetchQR() {
    try {
        const res = await fetch('/qr'); // server should serve QR code JSON
        const data = await res.json();
        if(data.qr) {
            document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(data.qr)}`;
        }
    } catch(err) {
        console.log('Error fetching QR', err);
    }
}

// refresh QR every 5 seconds
setInterval(fetchQR, 5000);
fetchQR();
</script>

</body>
</html>
