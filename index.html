<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💞 TEMPLE_MD BOT Pairing 💞</title>
<style>
    body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #fdf6f0; }
    h1 { color: #ff3399; }
    input, button { padding: 10px; margin: 10px; font-size: 16px; border-radius: 5px; }
</style>
</head>
<body>
<h1>💞 TEMPLE_MD BOT Pairing 💞</h1>
<p>Enter your WhatsApp number to get a pairing code:</p>
<input type="text" id="number" placeholder="e.g. +2348012345678" />
<button onclick="getCode()">Get Code</button>

<p id="status"></p>
<img id="qr" src="" alt="QR Code" style="display:none; margin-top:20px; width:300px;height:300px;"/>

<script>
async function getCode() {
    const number = document.getElementById('number').value;
    if(!number) return alert("Enter your number!");
    document.getElementById('status').innerText = "⏳ Generating pairing code...";
    
    const res = await fetch(`/pair?number=${encodeURIComponent(number)}`);
    const data = await res.json();
    
    if(data.qr){
        document.getElementById('qr').src = data.qr;
        document.getElementById('qr').style.display = "block";
        document.getElementById('status').innerText = `💞 Scan this QR with WhatsApp number ${number} to pair!`;
    } else {
        document.getElementById('status').innerText = "❌ Something went wrong!";
    }
}
</script>
</body>
</html>
