<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominion Bot Pairing</title>
<style>
    body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
    h1 { color: #ff3333; }
    input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin: 10px; }
    button { padding: 10px 20px; font-size: 16px; background: #ff3333; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #ff5555; }
    #qrCode { margin-top: 20px; }
</style>
</head>
<body>
<h1>☠️ Dominion Bot Pairing ☠️</h1>
<p>Enter your phone number to link your WhatsApp:</p>
<input type="text" id="phone" placeholder="+234XXXXXXXXXX">
<button onclick="startPair()">Generate QR Code</button>

<div id="qrCode"></div>
<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
async function startPair() {
    const phone = document.getElementById('phone').value.trim();
    if (!phone) return alert('Enter a valid phone number!');

    document.getElementById('status').innerText = '📟 Waiting for QR code...';
    const qrDiv = document.getElementById('qrCode');
    qrDiv.innerHTML = '';

    const pollQR = setInterval(async () => {
        try {
            const res = await fetch('/qr');
            const data = await res.json();
            if (data.qr && data.qr !== '') {
                qrDiv.innerHTML = '';
                QRCode.toCanvas(document.createElement('canvas'), data.qr, { width: 250 }, function (err, canvas) {
                    if (err) console.error(err);
                    qrDiv.appendChild(canvas);
                });
                document.getElementById('status').innerText = '📱 Scan this QR code with your WhatsApp to pair!';
            }
        } catch (e) {
            console.error(e);
        }
    }, 2000);
}
</script>
</body>
</html>
